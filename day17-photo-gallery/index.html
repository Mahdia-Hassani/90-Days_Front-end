<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>Photo Gallery</h1>
        <p>Practicing CSS Grid Layout</p>
    </header>

    <main class="gallery">
        <div class="photo large">
            <img src="assets/img/photo1.jpg" alt="photo 1">
        </div>
        <div class="photo">
            <img src="assets/img/photo2.jpg" alt="photo 2">
        </div>
        <div class="photo">
            <img src="assets/img/photo3.jpg" alt="photo 3">
        </div>
        <div class="photo tall">
            <img src="assets/img/photo4.jpg" alt="photo 4">
        </div>
        <div class="photo wide">
            <img src="assets/img/photo5.jpg" alt="photo5">
        </div>
        <div class="photo">
            <img src="assets/img/photo6.jpg" alt="photo6">
        </div>
        <div class="photo">
            <img src="assets/img/photo7.jpg" alt="photo7">
        </div>
        <div class="photo">
            <img src="assets/img/photo8.jpg" alt="photo8">
        </div>
        <div class="photo">
            <img src="assets/img/photo9.jpg" alt="photo9">
        </div>
        <div class="photo wide">
            <img src="assets/img/photo10.jpg" alt="photo10">
        </div>
    </main>
</body>
</html>
