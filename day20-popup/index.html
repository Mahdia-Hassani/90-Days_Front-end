<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <title>CSS Popup Delay</title>
  </head>
  <body>
    <input type="checkbox" id="popup-toggle" />

    <div class="popup-overlay"></div>

    <div class="popup">
      <label for="popup-toggle" class="close-btn">&times;</label>
      <h2>Welcome!</h2>
      <p>This popup appeared 2 seconds after page load.</p>
      <label for="popup-toggle">
        <button>OK</button>
      </label>
    </div>
  </body>
</html>
